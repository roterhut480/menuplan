<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Menüplan</title>
<style>
:root{--red:#e8390e;--rl:#fff2ef;--grn:#2e7d32;--grl:#f0faf4;--blu:#1565c0;--bll:#e8f0fe;--orn:#e65100;--orl:#fff3e0;--gr:#f5f5f5;--gr2:#e0e0e0;--gr3:#888;--txt:#111;--txt2:#555;--bdr:#e0e0e0;--r:10px;--rlg:14px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f3f3f3;color:var(--txt);min-height:100vh}
.scr{display:none;min-height:100vh;background:#f3f3f3;padding-bottom:32px}
.scr.on{display:block}
.tbar{background:var(--red);padding:14px 16px 12px;display:flex;align-items:center;gap:12px}
.tbar-bk{color:#fff;font-size:22px;cursor:pointer;padding-right:6px;opacity:.9}
.tbar h1{font-size:17px;font-weight:700;color:#fff;flex:1}
.tbar-sub{font-size:11px;color:rgba(255,255,255,.7);margin-top:1px}
.hero{background:var(--red);padding:24px 16px 20px;text-align:center}
.hero h1{font-size:24px;font-weight:800;color:#fff;letter-spacing:-.3px}
.hero p{font-size:13px;color:rgba(255,255,255,.75);margin-top:4px}
.card{background:#fff;border-radius:var(--rlg);margin:10px 10px 0;border:.5px solid var(--bdr);overflow:hidden}
.cp{padding:14px 16px}
.clbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gr3);margin-bottom:10px}
.btn{width:100%;padding:13px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .1s,opacity .15s}
.btn:active{transform:scale(.97);opacity:.9}
.btn-red{background:var(--red);color:#fff}
.btn-out{background:#fff;color:var(--txt2);border:.5px solid var(--bdr)}
.btn-grn{background:#fff;color:var(--grn);border:1px solid var(--grn)}
.btn:disabled{opacity:.35;pointer-events:none}
.btn+.btn{margin-top:8px}
.chip{padding:7px 14px;border-radius:100px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--bdr);background:#fff;color:var(--gr3);display:inline-block;transition:all .15s}
.chip.on{background:var(--rl);border-color:var(--red);color:var(--red)}
.chips{display:flex;gap:8px;flex-wrap:wrap}
input,select{width:100%;background:#fff;border:1px solid var(--bdr);border-radius:7px;color:var(--txt);font-size:14px;padding:10px 12px;outline:none;font-family:inherit;transition:border-color .2s}
input:focus,select:focus{border-color:var(--red)}
.fld{margin-bottom:10px}
.fld label{display:block;font-size:12px;color:var(--txt2);margin-bottom:5px;font-weight:500}
.tabs{display:flex;background:#ebebeb;border-radius:8px;padding:3px;margin:10px 10px 0}
.tab{flex:1;padding:7px;border-radius:6px;font-size:13px;font-weight:600;text-align:center;cursor:pointer;color:var(--gr3);transition:all .15s}
.tab.on{background:#fff;color:var(--txt);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.st{padding:10px 12px;border-radius:8px;font-size:13px;line-height:1.5;margin:10px 10px 0}
.st.ok{background:#e8f5e9;border:.5px solid #a5d6a7;color:#1b5e20}
.st.er{background:#ffebee;border:.5px solid #ef9a9a;color:#b71c1c}
.st.inf{background:var(--bll);border:.5px solid #90caf9;color:var(--blu)}
.sug{background:#fff;border-radius:var(--rlg);margin:8px 10px 0;border:1.5px solid var(--bdr);cursor:pointer;overflow:hidden}
.sug.sel{border-color:var(--red);border-width:2px}
.sug-h{padding:10px 12px 8px;border-bottom:.5px solid #f5f5f5}
.sug-n{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--gr3);margin-bottom:3px;display:flex;align-items:center;gap:6px}
.sug.sel .sug-n{color:var(--red)}
.sug-t{font-size:14px;font-weight:700;color:var(--txt)}
.sug-b{padding:8px 12px}
.sug-d{font-size:12px;color:var(--txt2);margin-bottom:2px}
.sug-nx{font-size:11px;color:#bbb;margin-bottom:5px;padding-left:28px}
.irow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:.5px solid #f5f5f5}
.irow:last-child{border-bottom:none}
.ichk{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--bdr);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ichk.on{background:var(--red);border-color:var(--red)}
.iname{font-size:13px;font-weight:500;flex:1}
.ispec{font-size:11px;color:var(--gr3)}
.irow.done .iname,.irow.done .ispec{text-decoration:line-through;opacity:.4}
.rcard{background:#fff;border-radius:var(--rlg);margin:8px 10px 0;border:.5px solid var(--bdr);overflow:hidden}
.rh{background:#f9f9f9;padding:10px 14px;border-bottom:.5px solid var(--bdr)}
.rday{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--gr3);margin-bottom:2px}
.rname{font-size:15px;font-weight:700;color:var(--txt)}
.rnext{font-size:11px;color:#bbb;margin-top:2px}
.ract{padding:10px 14px;display:flex;flex-direction:column;gap:7px}
.ctbar{background:var(--red);padding:14px 16px 0}
.ctop{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cback{color:rgba(255,255,255,.8);font-size:20px;cursor:pointer;padding-right:4px}
.ctit{font-size:16px;font-weight:700;color:#fff;flex:1}
.cstep{font-size:12px;color:rgba(255,255,255,.75)}
.cjump{background:rgba(255,255,255,.2);border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;color:#fff;cursor:pointer;display:none;white-space:nowrap}
.csegs{display:flex;gap:3px;padding-bottom:0}
.cseg{height:4px;border-radius:2px;flex:1;background:rgba(255,255,255,.25)}
.cseg.done{background:rgba(255,255,255,.6)}
.cseg.act{background:#fff}
.cprog{height:4px;background:rgba(0,0,0,.06)}
.cprogb{height:100%;background:var(--red);transition:width .4s}
.cbody{padding:14px}
.badge{display:inline-flex;align-items:center;gap:5px;border-radius:100px;padding:4px 11px;font-size:11px;font-weight:700;margin-bottom:10px}
.bv{background:var(--grl);color:var(--grn);border:.5px solid #a5d6a7}
.bf{background:var(--orl);color:var(--orn);border:.5px solid #ffcc80}
.bp{background:var(--bll);color:var(--blu);border:.5px solid #90caf9}
.bfr{background:#e3f2fd;color:#0277bd;border:.5px solid #90caf9}
.cstxt{font-size:16px;font-weight:500;color:var(--txt);line-height:1.6;margin-bottom:14px}
.csml{font-size:13px;color:var(--txt2);line-height:1.8;margin-bottom:14px}
.tbox{background:#f9f9f9;border-radius:8px;padding:12px;margin-bottom:14px;text-align:center;border:.5px solid var(--bdr)}
.tdisp{font-size:38px;font-weight:700;color:var(--txt);font-variant-numeric:tabular-nums;letter-spacing:-1px}
.tdisp.run{color:var(--red)}.tdisp.fin{color:var(--grn)}
.tsub{font-size:11px;color:var(--gr3);margin-bottom:8px}
.tprog{background:var(--gr2);border-radius:100px;height:3px;margin-bottom:8px;overflow:hidden}
.tprogb{height:100%;background:var(--red);border-radius:100px;transition:width 1s linear}
.adone{display:flex;align-items:center;gap:10px;padding:9px 12px;background:#f9f9f9;border-radius:8px;margin-bottom:12px;cursor:pointer;border:.5px solid var(--bdr)}
.adchk{width:19px;height:19px;border-radius:50%;border:1.5px solid var(--bdr);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.adchk.on{background:var(--grn);border-color:var(--grn)}
.cnav{display:flex;gap:8px}
.cnav .btn{flex:1;padding:11px;font-size:13px}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(232,57,14,.25);border-top-color:var(--red);border-radius:50%;animation:sp .7s linear infinite}
.spin.w{border-color:rgba(255,255,255,.3);border-top-color:#fff}
@keyframes sp{to{transform:rotate(360deg)}}
.prog{background:var(--gr2);border-radius:100px;height:5px;margin:6px 0;overflow:hidden}
.progb{height:100%;background:var(--red);border-radius:100px;transition:width .3s}
.dbg{font-family:monospace;font-size:11px;background:#f5f5f5;padding:8px;border-radius:6px;margin-top:8px;word-break:break-all;max-height:100px;overflow-y:auto;display:none}
</style>
</head>
<body>

<!-- HOME -->
<div class="scr on" id="sh">
  <div class="hero"><h1>🥦 Menüplan</h1><p>Deine Wochenplanung</p></div>
  <div class="card"><div class="cp">
    <div class="clbl">Diese Woche</div>
    <div class="fld"><label>Kochabende</label>
      <div class="chips" id="nchips">
        <div class="chip" onclick="setN(2)">2 Abende</div>
        <div class="chip on" onclick="setN(3)">3 Abende</div>
        <div class="chip" onclick="setN(4)">4 Abende</div>
      </div>
    </div>
    <div class="fld" style="margin-top:10px"><label>Thema (optional)</label><input id="theme" placeholder="mediterran, asiatisch…"></div>
    <div class="fld"><label>Vorhandenes (optional)</label><input id="exist" placeholder="z.B. Kartoffeln 2kg"></div>
  </div></div>
  <div style="padding:10px 10px 0">
    <button class="btn btn-red" onclick="goSuggest()">Menüvorschläge generieren →</button>
    <button class="btn btn-out" style="margin-top:8px;font-size:13px" onclick="loadTest()">🧪 Testdaten laden</button>
  </div>
  <div id="herr"></div>
</div>

<!-- VORSCHLÄGE -->
<div class="scr" id="ss">
  <div class="tbar">
    <div class="tbar-bk" onclick="go('sh')">←</div>
    <div><h1>Menüvorschläge</h1><div class="tbar-sub">Wähle eine Abfolge</div></div>
  </div>
  <div id="sload" style="text-align:center;padding:40px 16px;display:none">
    <div class="spin" style="width:26px;height:26px;margin:0 auto 12px;border-width:2.5px"></div>
    <div style="font-size:13px;color:var(--gr3)">Claude generiert Vorschläge…</div>
  </div>
  <div id="serr"></div>
  <div id="slist"></div>
  <div id="scta" style="display:none;padding:10px 10px 0">
    <button class="btn btn-red" onclick="goWeek()">Diese Woche planen →</button>
    <button class="btn btn-out" style="margin-top:8px" onclick="goSuggest()">Neue Vorschläge</button>
  </div>
</div>

<!-- WOCHE -->
<div class="scr" id="sw">
  <div class="tbar">
    <div class="tbar-bk" onclick="go('ss')">←</div>
    <div><h1 id="wtit" style="font-size:15px"></h1><div class="tbar-sub" id="wsub"></div></div>
  </div>
  <div class="tabs">
    <div class="tab on" onclick="wtab('e')">🛒 Einkauf</div>
    <div class="tab" onclick="wtab('r')">👨‍🍳 Rezepte</div>
  </div>
  <div id="te">
    <div class="card"><div class="cp">
      <div class="clbl">In Bring! importieren</div>
      <div class="fld"><label>Bring! E-Mail</label><input type="email" id="bemail" autocomplete="email"></div>
      <div class="fld"><label>Passwort</label><input type="password" id="bpw" autocomplete="current-password"></div>
      <div id="blistwrap" style="display:none">
        <div class="fld"><label>Welche Liste?</label><select id="blist"></select></div>
        <label style="display:flex;align-items:center;gap:8px;margin-bottom:12px;cursor:pointer;font-size:13px;color:var(--txt2)" onclick="document.getElementById('bclr').click()">
          <input type="checkbox" id="bclr" checked style="width:18px;height:18px;accent-color:var(--red)">
          Liste vor Import leeren
        </label>
      </div>
      <button class="btn btn-red" id="ibtn" onclick="doImport()">In Bring! importieren</button>
      <div class="prog" id="iprog" style="display:none"><div class="progb" id="iprogb"></div></div>
      <div id="idbg" class="dbg"></div>
    </div></div>
    <div id="ist"></div>
    <div class="card"><div class="cp">
      <div class="clbl">Einkaufsliste</div>
      <div id="elist"></div>
    </div></div>
  </div>
  <div id="tr" style="display:none"><div id="rlist"></div></div>
</div>

<!-- KOCHEN -->
<div class="scr" id="sc">
  <div class="ctbar">
    <div class="ctop">
      <div class="cback" onclick="go('sw')">←</div>
      <div style="flex:1"><div class="ctit" id="ctit"></div><div class="cstep" id="csteplbl"></div></div>
      <div class="cjump" id="cjump" onclick="jumpCur()">↑ Aktuell</div>
    </div>
    <div class="csegs" id="csegs"></div>
  </div>
  <div class="cprog"><div class="cprogb" id="cprogb"></div></div>
  <div class="cbody" id="cbody"></div>
</div>

<!-- PRINT -->
<div class="scr" id="sp">
  <div style="padding:10px">
    <button class="btn btn-out" onclick="go('sw')" style="margin-bottom:8px">← Zurück</button>
    <button class="btn btn-red" onclick="window.print()">📄 Als PDF speichern</button>
  </div>
  <div id="pcon" style="padding:14px;background:#fff;min-height:300px"></div>
</div>

<script>
const PROXY='https://menuplan-proxy.shop-242.workers.dev';
const BAPI=PROXY+'/bring';
const BH={'X-BRING-API-KEY':'cof4Nc6D8saplXjE3h3HXqHH8m7VU2i1Gs0g85Sp','X-BRING-CLIENT':'android','X-BRING-APPLICATION':'bring','X-BRING-COUNTRY':'CH','Content-Type':'application/x-www-form-urlencoded'};

const SYS=`Du bist Kochassistent für 2 Personen in Zürich. 1 Person vegi (kein Fisch), 1 Person vegi + optional Fleisch separat. Basis immer vegi. Mittags nur Mikrowelle oder kalt. Je 6 Portionen (2 Abend + 2 Mittag + 2 Einfrieren). Reste klar anders als Abend. Keine 2 schweren KH kombinieren. Mediterran/thematisch kohärent. Proteinreich. Empfindliche Zutaten früh in der Woche.
Antworte NUR mit validem JSON:
{"vorschlaege":[{"id":1,"thema":"Thema","kochabende":["Mo","Mi","Fr"],"gerichte":[{"tag":"Montag","abend":"Name","mittag_naechster_tag":"Mittagname","mittag_tag":"Dienstag","zutaten":[{"name":"Karotten","menge":"2 Stk"}],"schritte_vegi":[{"text":"Schritt","timer_min":0}],"schritte_fleisch":[{"text":"Fleisch optional","timer_min":5}],"prep_next":["Reste abfüllen","3 Min. Mikro"],"einfrieren":["2 Port. einfrieren","Beschriften"],"tipp":"Tipp"}]}]}`;

let G={n:3,sugs:[],sel:null,steps:[],cur:0,act:0,done:new Set(),tiv:null,tl:0,tt:0,bToken:null,bUUID:null,bLists:[]};
const $=id=>document.getElementById(id);
const sl=ms=>new Promise(r=>setTimeout(r,ms));

function go(id){document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));$(id).classList.add('on')}
function setN(n){G.n=n;document.querySelectorAll('#nchips .chip').forEach(c=>c.classList.toggle('on',c.textContent.startsWith(n)))}
function wtab(t){
  document.querySelectorAll('.tabs .tab').forEach((el,i)=>el.classList.toggle('on',(i===0&&t==='e')||(i===1&&t==='r')));
  $('te').style.display=t==='e'?'block':'none';
  $('tr').style.display=t==='r'?'block':'none';
}
function showSt(id,msg,type){const el=$(id);el.className='st '+type;el.textContent=msg;el.style.display='block';}

// Restore session
window.addEventListener('DOMContentLoaded',()=>{
  const s=localStorage.getItem('bs');
  if(s){try{const d=JSON.parse(s);G.bToken=d.t;G.bUUID=d.u;if($('bemail'))$('bemail').value=d.e||'';loadLists();}catch(e){localStorage.removeItem('bs');}}
});

async function loadLists(){
  if(!G.bToken)return;
  try{
    const h={...BH,'Authorization':G.bToken,'X-BRING-USER-UUID':G.bUUID,'Content-Type':'application/json'};
    const r=await fetch(`${BAPI}/bringusers/${G.bUUID}/lists`,{headers:h});
    if(!r.ok)return;
    const d=await r.json();
    G.bLists=Array.isArray(d.lists)?d.lists:[];
    $('blist').innerHTML=G.bLists.map(l=>`<option value="${l.listUuid}">${l.name}</option>`).join('');
    $('blistwrap').style.display='block';
    $('bemail').closest('.fld').style.display='none';
    $('bpw').closest('.fld').style.display='none';
    $('ibtn').textContent='In Bring! importieren';
  }catch(e){console.warn('Listen laden:',e);}
}

async function doImport(){
  const btn=$('ibtn');
  const dbg=$('idbg');
  dbg.style.display='none';

  // Login if needed
  if(!G.bToken){
    const email=$('bemail').value.trim();
    const pw=$('bpw').value;
    if(!email||!pw){showSt('ist','Bitte E-Mail und Passwort eingeben.','er');return;}
    btn.innerHTML='<span class="spin w"></span> Anmelden…';btn.disabled=true;
    try{
      const r=await fetch(`${BAPI}/v2/bringauth`,{method:'POST',headers:BH,body:new URLSearchParams({email,password:pw}).toString()});
      const d=await r.json();
      if(!r.ok)throw new Error(d.message||`Fehler ${r.status}`);
      G.bToken=`${d.token_type} ${d.access_token}`;
      G.bUUID=d.uuid;
      localStorage.setItem('bs',JSON.stringify({t:G.bToken,u:G.bUUID,e:email}));
      await loadLists();
    }catch(e){
      showSt('ist',`Login fehlgeschlagen: ${e.message}`,'er');
      btn.innerHTML='In Bring! importieren';btn.disabled=false;return;
    }
  }

  if(!G.sel&&G.sel!==0){showSt('ist','Bitte zuerst eine Menüwoche auswählen.','er');return;}
  const sug=G.sugs[G.sel];
  const listUuid=$('blist').value;
  if(!listUuid){showSt('ist','Bitte eine Bring!-Liste auswählen.','er');return;}

  const items=getItems(sug);
  const clearFirst=$('bclr').checked;
  btn.innerHTML='<span class="spin w"></span> Importiere…';btn.disabled=true;
  $('iprog').style.display='block';

  const h={...BH,'Authorization':G.bToken,'X-BRING-USER-UUID':G.bUUID};
  const hj={...BH,'Authorization':G.bToken,'X-BRING-USER-UUID':G.bUUID,'Content-Type':'application/json'};

  try{
    // Leeren
    if(clearFirst){
      try{
        const r=await fetch(`${BAPI}/bringlists/${listUuid}`,{headers:hj});
        if(r.ok){
          const d=await r.json();
          const arr=Array.isArray(d.purchase)?d.purchase:Array.isArray(d.items)?d.items:[];
          for(const it of arr){
            const name=typeof it==='string'?it:(it.itemId||it.name||'');
            if(name){
              await fetch(`${BAPI}/bringlists/${listUuid}`,{method:'POST',headers:h,
                body:new URLSearchParams({purchase:name,remove:'true'}).toString()});
              await sl(80);
            }
          }
        }
      }catch(ex){console.warn('Leeren fehlgeschlagen:',ex);}
    }

    // Artikel hinzufügen – mit Debug
    let lastResp='';
    for(let i=0;i<items.length;i++){
      $('iprogb').style.width=`${Math.round((i/items.length)*100)}%`;
      const {name,menge}=items[i];
      const body=new URLSearchParams({purchase:name,recently:'',specification:menge});
      const r=await fetch(`${BAPI}/bringlists/${listUuid}`,{method:'POST',headers:h,body:body.toString()});
      lastResp=`Status ${r.status} | ${name}`;
      await sl(150);
    }

    $('iprogb').style.width='100%';

    // Debug anzeigen
    dbg.textContent=`Letzter Request: ${lastResp}`;
    dbg.style.display='block';

    showSt('ist',`✓ ${items.length} Artikel gesendet (Status siehe Debug unten)${lastResp.includes('400')||lastResp.includes('401')||lastResp.includes('500')?' – Fehler aufgetreten!':' – prüfe Bring! App'}` ,'ok');
    btn.innerHTML='✓ Importiert';

  }catch(e){
    showSt('ist',`Import fehlgeschlagen: ${e.message}`,'er');
    btn.innerHTML='Nochmals versuchen';btn.disabled=false;
  }
}

async function goSuggest(){
  go('ss');$('sload').style.display='block';$('slist').innerHTML='';$('scta').style.display='none';$('serr').innerHTML='';
  G.sel=null;
  const theme=$('theme').value.trim();const exist=$('exist').value.trim();
  const msg=`Generiere genau 3 Menüvorschläge mit je ${G.n} Kochabenden.${theme?' Thema: '+theme+'.':''}${exist?' Vorhanden: '+exist+'.':''}`;
  try{
    const r=await fetch(PROXY+'/anthropic',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:5000,system:SYS,messages:[{role:'user',content:msg}]})});
    if(!r.ok)throw new Error(`API ${r.status}`);
    const d=await r.json();
    const raw=d.content?.[0]?.text||'';
    const m=raw.match(/\{[\s\S]*\}/);
    G.sugs=JSON.parse(m?m[0]:raw).vorschlaege||[];
    $('sload').style.display='none';renderSugs();$('scta').style.display='block';
  }catch(e){
    $('sload').style.display='none';
    const el=$('serr');el.className='st er';el.textContent=`Fehler: ${e.message}`;
    $('scta').style.display='block';
  }
}

function renderSugs(){
  $('slist').innerHTML=G.sugs.map((s,i)=>`
    <div class="sug${i===G.sel?' sel':''}" id="sg${i}" onclick="selSug(${i})">
      <div class="sug-h">
        <div class="sug-n"><span>Option ${i+1}</span>${i===G.sel?'<span style="background:var(--red);border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff">✓</span>':''}</div>
        <div class="sug-t">${s.thema}</div>
      </div>
      <div class="sug-b">${s.gerichte.map(g=>`<div class="sug-d"><b style="color:var(--txt);min-width:22px;display:inline-block">${g.tag.slice(0,2)}</b> ${g.abend}</div><div class="sug-nx">↳ ${g.mittag_tag}: ${g.mittag_naechster_tag}</div>`).join('')}</div>
    </div>`).join('');
}
function selSug(i){G.sel=i;renderSugs();}

function goWeek(){
  if(G.sel===null)return;
  const s=G.sugs[G.sel];
  $('wtit').textContent=s.thema;$('wsub').textContent=s.kochabende?.join(' · ')||'';
  renderEink(s);renderRez(s);wtab('e');go('sw');
}

function getItems(sug){
  const items=[];const seen=new Map();
  sug.gerichte.forEach(g=>(g.zutaten||[]).forEach(z=>{
    const k=z.name.toLowerCase();
    if(seen.has(k)){items[seen.get(k)].menge+=` + ${z.menge}`;}
    else{seen.set(k,items.length);items.push({name:z.name,menge:z.menge});}
  }));return items;
}

function renderEink(sug){
  const items=getItems(sug);
  $('elist').innerHTML=items.map((it,i)=>`
    <div class="irow" id="ir${i}" onclick="togItem(${i})">
      <div class="ichk" id="ic${i}"></div>
      <div><div class="iname">${it.name}</div><div class="ispec">${it.menge}</div></div>
    </div>`).join('');
}
function togItem(i){
  const c=$(`ic${i}`),r=$(`ir${i}`);
  const on=c.classList.toggle('on');
  c.innerHTML=on?'<svg width="11" height="11" viewBox="0 0 11 11"><path d="M2 5.5l2.5 2.5L9 3" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg>':'';
  r.classList.toggle('done',on);
}

function renderRez(sug){
  $('rlist').innerHTML=sug.gerichte.map((g,ri)=>`
    <div class="rcard">
      <div class="rh"><div class="rday">${g.tag}</div><div class="rname">${g.abend}</div><div class="rnext">→ ${g.mittag_tag}: ${g.mittag_naechster_tag}</div></div>
      <div class="ract">
        <button class="btn btn-red" onclick="startCook(${ri})">👨‍🍳 Jetzt kochen</button>
        <button class="btn btn-out" onclick="showPrint(${ri})">📄 Als PDF</button>
      </div>
    </div>`).join('');
}

// COOK
function buildSteps(g){
  const st=[];
  (g.schritte_vegi||[]).forEach(s=>st.push({...s,type:'v'}));
  (g.schritte_fleisch||[]).forEach(s=>st.push({...s,type:'f'}));
  if(g.prep_next?.length)st.push({text:g.prep_next.join('\n'),type:'p',timer_min:0,ml:true});
  if(g.einfrieren?.length)st.push({text:g.einfrieren.join('\n'),type:'fr',timer_min:0,ml:true});
  if(g.tipp)st.push({text:g.tipp,type:'t',timer_min:0});
  return st;
}
function startCook(ri){
  const g=G.sugs[G.sel].gerichte[ri];
  G.steps=buildSteps(g);G.cur=0;G.act=0;G.done=new Set();clearInterval(G.tiv);
  $('ctit').textContent=g.abend;renderSegs();renderStep();go('sc');
}
function renderSegs(){
  $('csegs').innerHTML=G.steps.map((_,i)=>`<div class="cseg ${i<G.act?'done':i===G.act?'act':''}" id="sg_${i}"></div>`).join('');
}
function updSegs(){
  G.steps.forEach((_,i)=>{const el=$(`sg_${i}`);if(el)el.className=`cseg ${i<G.act?'done':i===G.act?'act':''}`;});
  $('cprogb').style.width=`${Math.round((G.act/Math.max(1,G.steps.length-1))*100)}%`;
  $('csteplbl').textContent=`Schritt ${G.cur+1} von ${G.steps.length}`;
  $('cjump').style.display=G.cur!==G.act?'block':'none';
}
const badges={v:'<div class="badge bv">🌿 Basis – beide</div>',f:'<div class="badge bf">🍖 Fleisch-Beilage</div>',p:'<div class="badge bp">📦 Für morgen</div>',fr:'<div class="badge bfr">🧊 Einfrieren</div>',t:'<div class="badge bv">💡 Tipp</div>'};
function renderStep(){
  clearInterval(G.tiv);
  const s=G.steps[G.cur];const isDone=G.done.has(G.cur);const isLast=G.cur===G.steps.length-1;
  const lines=(s.text||'').split('\n').filter(Boolean);
  const txt=s.ml?`<div class="csml">${lines.map((l,i)=>`<div style="display:flex;gap:8px;margin-bottom:4px"><span style="font-size:12px;font-weight:700;color:var(--red);min-width:16px">${i+1}.</span><span>${l}</span></div>`).join('')}</div>`:`<div class="cstxt">${s.text}</div>`;
  let th='';
  if(s.timer_min>0){G.tl=s.timer_min*60;G.tt=G.tl;th=`<div class="tbox"><div class="tdisp" id="td">${fmt(G.tl)}</div><div class="tsub">${s.timer_min} Minuten</div><div class="tprog"><div class="tprogb" id="tb" style="width:100%"></div></div><button class="btn btn-red" id="tbtn" onclick="startT()" style="padding:9px;font-size:13px">▶ Timer starten</button></div>`;}
  const adHTML=`<div class="adone" onclick="togDone()"><div class="adchk ${isDone?'on':''}" id="adchk">${isDone?'<svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 5l2.5 2.5L8 2.5" stroke="#fff" stroke-width="1.6" fill="none" stroke-linecap="round"/></svg>':''}</div><span style="font-size:13px;color:var(--txt2)">Schritt bereits vorbereitet</span></div>`;
  const mainBtn=isDone?`<button class="btn btn-grn" onclick="unDone()">↩ Als unerledigt markieren</button>`:`<button class="btn btn-red" onclick="doComplete()">${isLast?'✓ Rezept fertig':'✓ Schritt abschliessen'}</button>`;
  $('cbody').innerHTML=`${badges[s.type]||''}${txt}${th}${adHTML}<div style="display:flex;flex-direction:column;gap:8px">${mainBtn}<div class="cnav"><button class="btn btn-out" onclick="cnav(-1)" ${G.cur===0?'disabled':''}>← Zurück</button><button class="btn btn-out" onclick="cnav(1)" ${G.cur===G.steps.length-1?'disabled':''}>Weiter →</button></div></div>`;
  updSegs();
}
function cnav(d){clearInterval(G.tiv);const n=G.cur+d;if(n<0||n>=G.steps.length)return;G.cur=n;renderStep();}
function jumpCur(){G.cur=G.act;renderStep();}
function doComplete(){G.done.add(G.cur);clearInterval(G.tiv);if(G.cur===G.steps.length-1){go('sw');return;}if(G.cur===G.act)G.act=Math.min(G.act+1,G.steps.length-1);G.cur=G.act;renderStep();}
function unDone(){G.done.delete(G.cur);renderStep();}
function togDone(){G.done.has(G.cur)?unDone():doComplete();}
function startT(){
  const btn=$('tbtn');if(!btn)return;
  btn.textContent='⏸ Läuft…';btn.disabled=true;$('td').classList.add('run');
  G.tiv=setInterval(()=>{
    G.tl--;
    if(G.tl<=0){clearInterval(G.tiv);$('td').textContent='✓ Fertig!';$('td').classList.remove('run');$('td').classList.add('fin');$('tb').style.width='0%';btn.textContent='✓ Fertig';return;}
    $('td').textContent=fmt(G.tl);$('tb').style.width=`${Math.round((G.tl/G.tt)*100)}%`;
    if(G.tl<=30)$('td').style.color='#b71c1c';
  },1000);
}
function fmt(s){return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`}

function showPrint(ri){
  const sug=G.sugs[G.sel];const g=sug.gerichte[ri];const items=getItems(sug);
  $('pcon').innerHTML=`<h1 style="font-size:20px;font-weight:800;margin-bottom:4px">${g.abend}</h1><p style="color:#888;margin-bottom:16px;font-size:13px">${g.tag} → ${g.mittag_tag}: ${g.mittag_naechster_tag}</p><h2 style="font-size:14px;font-weight:700;margin-bottom:8px;color:#e8390e">Zutaten</h2><table style="width:100%;border-collapse:collapse;margin-bottom:16px;font-size:13px">${(g.zutaten||[]).map(z=>`<tr><td style="padding:5px 0;border-bottom:1px solid #f0f0f0;font-weight:500">☐ ${z.name}</td><td style="padding:5px 0;border-bottom:1px solid #f0f0f0;color:#888;text-align:right">${z.menge}</td></tr>`).join('')}</table><h2 style="font-size:14px;font-weight:700;margin-bottom:8px;color:#2e7d32">🌿 Zubereitung</h2>${(g.schritte_vegi||[]).map((s,i)=>`<div style="margin-bottom:8px;font-size:13px"><strong style="color:#e8390e">${i+1}.</strong> ${s.text}${s.timer_min?` <span style="color:#888">[${s.timer_min} Min.]</span>`:''}</div>`).join('')}${g.schritte_fleisch?.length?`<h2 style="font-size:14px;font-weight:700;margin:12px 0 8px;color:#e65100">🍖 Fleisch-Beilage</h2>${g.schritte_fleisch.map((s,i)=>`<div style="margin-bottom:8px;font-size:13px"><strong>${i+1}.</strong> ${s.text}</div>`).join('')}`:''}<h2 style="font-size:14px;font-weight:700;margin:12px 0 8px;color:#1565c0">📦 Für morgen</h2>${(g.prep_next||[]).map((s,i)=>`<div style="margin-bottom:6px;font-size:13px"><strong>${i+1}.</strong> ${s}</div>`).join('')}<h2 style="font-size:14px;font-weight:700;margin:12px 0 8px;color:#0277bd">🧊 Einfrieren</h2>${(g.einfrieren||[]).map((s,i)=>`<div style="margin-bottom:6px;font-size:13px"><strong>${i+1}.</strong> ${s}</div>`).join('')}${g.tipp?`<div style="background:#fff9c4;border-left:3px solid #f9a825;padding:10px;margin-top:12px;border-radius:4px;font-size:13px"><strong>💡</strong> ${g.tipp}</div>`:''}<h2 style="font-size:14px;font-weight:700;margin:16px 0 8px;color:#e8390e">🛒 Einkaufsliste</h2><table style="width:100%;border-collapse:collapse;font-size:13px">${items.map(z=>`<tr><td style="padding:5px 0;border-bottom:1px solid #f0f0f0">☐ ${z.name}</td><td style="padding:5px 0;border-bottom:1px solid #f0f0f0;color:#888;text-align:right">${z.menge}</td></tr>`).join('')}</table>`;
  go('sp');
}

function loadTest(){
  G.sugs=[{id:1,thema:"Test – Mediterran",kochabende:["Montag","Mittwoch","Freitag"],gerichte:[
    {tag:"Montag",abend:"Saag Paneer mit Basmatireis",mittag_naechster_tag:"Saag Paneer aufgewärmt",mittag_tag:"Dienstag",
     zutaten:[{name:"Paneer",menge:"450g"},{name:"Spinat TK",menge:"500g"},{name:"Zwiebel",menge:"1 Stk"},{name:"Basmatireis",menge:"400g"},{name:"Ghee",menge:"2 EL"},{name:"Knoblauch",menge:"3 Zehen"}],
     schritte_vegi:[{text:"Ghee erhitzen, Paneer goldbraun anbraten.",timer_min:0},{text:"Zwiebel, Knoblauch, Ingwer anschwitzen. 10 Min. köcheln.",timer_min:10}],
     schritte_fleisch:[{text:"Hähnchen separat anbraten – neben Saag Paneer servieren.",timer_min:6}],
     prep_next:["Saag Paneer in Tupperdose","Reis separat","Mittags: 3 Min. Mikrowelle"],
     einfrieren:["2 Portionen einfrieren","Beschriften"],tipp:"Spinat gut ausdrücken."},
    {tag:"Mittwoch",abend:"Zucchini-Ricotta-Pasta",mittag_naechster_tag:"Kalter Pastasalat",mittag_tag:"Donnerstag",
     zutaten:[{name:"Pasta",menge:"600g"},{name:"Zucchini",menge:"3 Stk"},{name:"Ricotta",menge:"250g"},{name:"Parmesan",menge:"80g"}],
     schritte_vegi:[{text:"Pasta kochen.",timer_min:0},{text:"Zucchini braten, Ricotta einrühren.",timer_min:0}],
     schritte_fleisch:[{text:"Pancetta knusprig braten.",timer_min:4}],
     prep_next:["Pasta kalt abfüllen"],einfrieren:["2 Portionen einfrieren"],tipp:"Ricotta am Schluss."}
  ]}];
  G.sel=0;goWeek();
}
</script>
